[project]
name = "dementor"
version = "1.0.0.dev19"
license-files = ["LICENSE"]

# Python 3.11 required as tomllib was added in 3.11
requires-python = ">=3.11"
description = "LLMNR/NBT-NS/mDNS Poisoner and rogue service provider"
authors = [{ name = "MatrixEditor" }]
maintainers = [{ name = "MatrixEditor" }]
readme = "docs/README.pypi.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Security",
    "Topic :: System :: Networking",
    "Typing :: Typed",
    "Operating System :: POSIX",
    "Operating System :: Unix",
]

dependencies = [
    "rich",
    "impacket",
    "scapy",
    "aiosmtpd",
    "sqlalchemy",
    "pyasn1",
    "aioquic",
    "typer",
    "jinja2",
    "typing-extensions",
    "caterpillar-py>=2.8.1",
    "pyipp",
]

[project.scripts]
dementor = "dementor.standalone:run_from_cli"
Dementor = "dementor.standalone:run_from_cli"

[project.urls]
homepage = "https://matrixeditor.github.io/dementor"
documentation = "https://matrixeditor.github.io/dementor"
source = "https://github.com/MatrixEditor/dementor"

[tool.setuptools.packages.find]
where = ["."]
include = ["dementor*"]

[tool.setuptools.package-data]
dementor = ["assets/**"]

[project.optional-dependencies]
docs = [
    "sphinx",
    "shibuya",
    "sphinx-copybutton",
    "sphinx-design",
]
dev = [
    "pytest",
    "ruff",
    "ty",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 90
src = ["dementor", "tests"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
]
ignore = [
    "E501",
    "I001",
    "B010"
]

[tool.ruff.format]
docstring-code-format = true