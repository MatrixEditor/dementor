name: "CI: Build and Deploy Sphinx Documentation"

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
          check-latest: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build docs
        run: |
          set -euo pipefail
          uv run --extra docs sphinx-build -M html docs/source docs/build --fail-on-warning
          touch docs/build/html/.nojekyll

      - name: Configure Pages
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5.0.0

      - name: Upload Pages artifact
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: docs/build/html

  deploy:
    name: Deploy docs
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
